<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#04080F" rx="44"/>

  <!-- ── LEFT PLATES ── -->
  <!-- tiny -->
  <rect x="70" y="174" width="8" height="22" rx="2" fill="white" fill-opacity="0.22"/>
  <!-- small -->
  <rect x="80" y="165" width="13" height="40" rx="3" fill="#0A84FF" fill-opacity="0.55"/>
  <!-- large (glow) -->
  <rect x="95" y="154" width="18" height="62" rx="4" fill="#0A84FF" filter="url(#glow)"/>
  <!-- micro -->
  <rect x="116" y="168" width="11" height="34" rx="2" fill="white" fill-opacity="0.15"/>

  <!-- ── BAR ── -->
  <rect x="127" y="182" width="146" height="6" rx="3" fill="white" fill-opacity="0.20"/>

  <!-- ── RIGHT PLATES ── -->
  <!-- micro -->
  <rect x="273" y="168" width="11" height="34" rx="2" fill="white" fill-opacity="0.15"/>
  <!-- large (glow) -->
  <rect x="287" y="154" width="18" height="62" rx="4" fill="#0A84FF" filter="url(#glow)"/>
  <!-- small -->
  <rect x="307" y="165" width="13" height="40" rx="3" fill="#0A84FF" fill-opacity="0.55"/>
  <!-- tiny -->
  <rect x="322" y="174" width="8" height="22" rx="2" fill="white" fill-opacity="0.22"/>

  <!-- ── TEXT ── -->
  <text
    x="200" y="276"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="800" fill="white"
    text-anchor="middle"
    letter-spacing="-2">Barbellz</text>

  <text
    x="200" y="304"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="11" font-weight="700" fill="#0A84FF"
    text-anchor="middle"
    letter-spacing="3.5">LIFT · TRACK · GROW</text>
</svg>
