<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#0E1E30"/>
      <stop offset="100%" stop-color="#04080F"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="halo" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A84FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0A84FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Blue halo behind barbell -->
  <ellipse cx="540" cy="420" rx="280" ry="120" fill="#0A84FF" fill-opacity="0.06" filter="url(#halo)"/>

  <!-- Top label -->
  <text x="540" y="108"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="12" font-weight="700" fill="#0A84FF"
    text-anchor="middle" letter-spacing="7">COMING SOON TO THE APP STORE</text>

  <!-- Barbell (scale 2.7×, center x=540, center y=420) -->
  <rect x="189" y="390" width="22" height="59" rx="4" fill="white" fill-opacity="0.22"/>
  <rect x="215" y="366" width="35" height="108" rx="6" fill="#0A84FF" fill-opacity="0.55"/>
  <rect x="254" y="336" width="49" height="167" rx="9" fill="#0A84FF" filter="url(#glow)"/>
  <rect x="311" y="374" width="30" height="92" rx="5" fill="white" fill-opacity="0.15"/>
  <rect x="341" y="412" width="394" height="16" rx="8" fill="white" fill-opacity="0.20"/>
  <rect x="735" y="374" width="30" height="92" rx="5" fill="white" fill-opacity="0.15"/>
  <rect x="777" y="336" width="49" height="167" rx="9" fill="#0A84FF" filter="url(#glow)"/>
  <rect x="830" y="366" width="35" height="108" rx="6" fill="#0A84FF" fill-opacity="0.55"/>
  <rect x="869" y="390" width="22" height="59" rx="4" fill="white" fill-opacity="0.22"/>

  <!-- Barbellz -->
  <text x="540" y="635"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="118" font-weight="800" fill="white"
    text-anchor="middle" letter-spacing="-4">Barbellz</text>

  <text x="540" y="682"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="700" fill="#0A84FF"
    text-anchor="middle" letter-spacing="5">LIFT · TRACK · GROW</text>

  <!-- Divider -->
  <rect x="190" y="724" width="700" height="1" fill="url(#accentLine)"/>

  <!-- Features -->
  <text x="540" y="790"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="17" font-weight="500" fill="rgba(255,255,255,0.50)"
    text-anchor="middle" letter-spacing="0.5">Workouts  ·  Nutrition  ·  Progress</text>

  <!-- CTA pill -->
  <rect x="315" y="828" width="450" height="66" rx="20" fill="rgba(10,132,255,0.10)" stroke="#0A84FF" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="540" y="869"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="19" font-weight="700" fill="white"
    text-anchor="middle">Available Soon on App Store</text>

  <!-- Handle -->
  <text x="540" y="978"
    font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="14" font-weight="600" fill="rgba(255,255,255,0.22)"
    text-anchor="middle" letter-spacing="1">barbellz.app</text>
</svg>
